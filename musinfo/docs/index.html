<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUSINFO — Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080808;
      --surface:    #222428;
      --border:     #434343;
      --accent:     #30AE30;
      --accent-dim: #2e872d;
      --text:       #d4d6d9;
      --text-dim:   #5a5e66;
      --text-mid:   #8c9099;
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'IBM Plex Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.75;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 48px;
      gap: 24px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--text-dim); font-weight: 400; }

    nav { display: flex; gap: 2px; margin-left: auto; }
    nav a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover  { color: var(--text); background: var(--border); }
    nav a.active { color: var(--accent); background: rgba(200,240,74,0.07); }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 52px 40px 100px;
    }

    #content h1 {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    #content h2 {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-top: 56px;
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    #content h3 {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-dim);
      margin-top: 32px;
      margin-bottom: 10px;
    }
    #content h4 {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 20px;
      margin-bottom: 8px;
    }
    #content p    { font-weight: 300; color: var(--text); margin-bottom: 12px; }
    #content a    { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-dim); }
    #content a:hover { border-bottom-color: var(--accent); }
    #content ul, #content ol { margin: 8px 0 14px 20px; }
    #content li   { font-weight: 300; color: var(--text); margin-bottom: 5px; }
    #content li strong { font-weight: 500; }
    #content strong { font-weight: 500; }
    #content code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--border);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 3px;
    }
    #content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      overflow-x: auto;
      margin: 16px 0;
    }
    #content pre code {
      background: none;
      color: var(--text-mid);
      padding: 0;
      font-size: 12px;
      line-height: 1.6;
    }
    #content blockquote {
      border-left: 3px solid var(--accent-dim);
      padding: 4px 0 4px 16px;
      margin: 16px 0;
      color: var(--text-mid);
      font-style: italic;
    }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
    #content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
    #content th {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-mid);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #content td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-weight: 300;
      vertical-align: top;
    }
    #content tr:last-child td { border-bottom: none; }

    .error {
      font-family: var(--mono);
      font-size: 13px;
      color: #e06c75;
      background: rgba(224,108,117,0.08);
      border: 1px solid rgba(224,108,117,0.2);
      border-radius: 4px;
      padding: 20px;
      margin-top: 40px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MUSINFO <span>/ architecture</span></div>
  <nav>
    <a href="index.html" class="active">Architecture</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main>
  <div id="content">Loading...</div>
</main>

<script>
  marked.use({
    gfm: true,
    breaks: false,
    renderer: {
      // Open external links in a new tab; keep anchor (#) links in-page.
      link({ href, title, text }) {
        const isExternal = href && /^https?:\/\//.test(href);
        const titleAttr  = title ? ` title="${title}"` : '';
        const target     = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
        return `<a href="${href}"${titleAttr}${target}>${text}</a>`;
      }
    }
  });

  function render(md) {
    document.getElementById('content').innerHTML = marked.parse(md);
  }

  function showError(msg) {
    document.getElementById('content').innerHTML =
      '<div class="error"><strong>Could not load ARCHITECTURE.md</strong><br><br>' + msg + '</div>';
  }

  // Primary: content injected by Tauri's initialization_script (window.__DOC_CONTENT__)
  // Fallback: fetch for local browser development
  if (typeof window.__DOC_CONTENT__ === 'string') {
    render(window.__DOC_CONTENT__);
  } else {
    fetch('../../ARCHITECTURE.md')
      .then(function(r) {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(render)
      .catch(function(err) {
        showError(err.message +
          '<br><br>If you are opening this file directly in Chrome or Edge, ' +
          'local file fetch is blocked. Open via the MUSINFO app instead.');
      });
  }
</script>
</body>
</html>
